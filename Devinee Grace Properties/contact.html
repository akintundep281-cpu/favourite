<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Contact | DevineeGrace</title>
  <meta name="description" content="Get in touch with DevineeGrace Properties – WhatsApp, email, or visit us." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f9f9ff; --text: #1f1f2e; --card: #ffffff; --accent: #ff3366;
      --header: rgba(10,10,20,0.92); --header-text: #fff; --footer-bg: #0b0b14; --footer-text: #b0b0c0;
    }
    [data-theme="dark"] { --bg: #0c0c18; --text: #efeff5; --card: #18182b; --accent: #ff4d7a; --footer-bg: #03030c; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 28px; }
    header { position: fixed; top: 0; left: 0; right: 0; background: var(--header); backdrop-filter: blur(16px); z-index: 1100; padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    header .container { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.9rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffccdd); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logo span { background: linear-gradient(120deg, var(--accent), #ff8a5c); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav { display: flex; gap: 2rem; }
    .nav a { color: var(--header-text); text-decoration: none; font-weight: 500; }
    .nav a:hover { color: var(--accent); }
    .header-tools { display: flex; align-items: center; gap: 1.2rem; }
    .icon-btn { background: transparent; border: none; font-size: 1.4rem; color: #fff; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .icon-btn:hover { background: rgba(255,255,255,0.15); color: var(--accent); }
    .hamburger { display: none; background: none; border: none; font-size: 1.8rem; color: white; cursor: pointer; }
    .contact-hero { padding: 180px 20px 80px; text-align: center; background: linear-gradient(125deg, #0a0f2a, #25204e); color: white; }
    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 2rem; margin: 3rem 0; }
    .contact-card { background: var(--card); border-radius: 28px; padding: 2rem; text-align: center; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); transition: 0.25s; }
    .contact-card:hover { transform: translateY(-8px); }
    .contact-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; }
    .btn-primary { background: var(--accent); color: white; padding: 12px 32px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 1rem; font-weight: 600; transition: 0.2s; border: none; cursor: pointer; }
    .btn-primary:hover { transform: scale(1.05); background: #e01e55; }
    footer { background: var(--footer-bg); padding: 3rem 1rem; text-align: center; margin-top: 3rem; color: var(--footer-text); }
    @media (max-width: 820px) {
      .nav { position: fixed; top: 0; left: -100%; width: 80%; max-width: 320px; height: 100vh; background: rgba(10,10,20,0.98); backdrop-filter: blur(20px); flex-direction: column; justify-content: center; align-items: center; transition: left 0.4s; z-index: 1050; gap: 2rem; }
      .nav.active { left: 0; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <div class="logo">Devinee<span>Grace</span></div>
    <nav class="nav" id="navMenu">
      <a href="index.html">Home</a>
      <a href="properties.html">Properties</a>
      <a href="contact.html">Contact</a>
      <a href="news.html">News</a>
    </nav>
    <div class="header-tools">
      <button class="icon-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></button>
      <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<section class="contact-hero">
  <div class="container">
    <h1>Let’s talk luxury</h1>
    <p>Reach out – we reply within hours</p>
  </div>
</section>

<div class="container">
  <div class="contact-grid">
    <div class="contact-card"><i class="fab fa-whatsapp"></i><h3>WhatsApp</h3><p>+234 903 377 1605</p><a href="https://wa.me/2349033771605" class="btn-primary">Chat now</a></div>
   
    <div class="contact-card"><i class="fas fa-map-marker-alt"></i><h3>Visit us</h3><p>Unity Close Gasline, Ijoko, Ogun, Nigeria</p><a href="https://wa.me/2349033771605" class="btn-primary">Schedule visit</a></div>
  </div>
</div>

<footer>
  <div class="container">
    <p>© 2026 DevineeGrace Properties – Your trusted real estate partner</p>
  </div>
</footer>

<script>
  const WHATSAPP = "2349033771605";
  let cart = JSON.parse(localStorage.getItem("devinee_cart") || "[]");
  function updateBadge() { const badge = document.getElementById("cartBadge"); if(badge) badge.textContent = cart.length; }
  updateBadge();
  document.getElementById("cartBtn").onclick = () => {
    let msg = cart.length ? "Hello, my shortlist:\n" + cart.map(c => `- ${c.name} (${c.location})`).join("\n") : "Hello, I'd like more information.";
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
  };
  const themeBtn = document.getElementById("themeBtn");
  const savedTheme = localStorage.getItem("devinee_theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  themeBtn.innerHTML = savedTheme === "dark" ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  themeBtn.onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme");
    const nxt = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", nxt);
    localStorage.setItem("devinee_theme", nxt);
    themeBtn.innerHTML = nxt === "dark" ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  };
  document.getElementById("hamburgerBtn").onclick = () => document.getElementById("navMenu").classList.toggle("active");
</script>
</body>
</html>
