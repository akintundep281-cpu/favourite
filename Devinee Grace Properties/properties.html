<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Properties | DevineeGrace</title>
  <meta name="description" content="Browse all luxury homes, shops, filling stations, estates, lands – plus video tours you can manage yourself." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f9f9ff; --text: #1f1f2e; --card: #ffffff; --card-text: #1a1a2a;
      --muted: #5a5a70; --header: rgba(10,10,20,0.92); --header-text: #fff;
      --accent: #ff3366; --accent-glow: rgba(255,51,102,0.25);
      --shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
      --shadow-hover: 0 30px 45px -12px rgba(0,0,0,0.2);
      --footer-bg: #0b0b14; --footer-text: #b0b0c0; --border-light: rgba(0,0,0,0.05);
    }
    [data-theme="dark"] {
      --bg: #0c0c18; --text: #efeff5; --card: #18182b; --card-text: #f0f0fc;
      --muted: #a2a2bb; --header: rgba(8,8,18,0.96); --accent: #ff4d7a;
      --footer-bg: #03030c; --border-light: rgba(255,255,255,0.08);
    }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
    .container { max-width: 1350px; margin: 0 auto; padding: 0 28px; }
    header { position: fixed; top: 0; left: 0; right: 0; background: var(--header); backdrop-filter: blur(16px); z-index: 1100; padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    header .container { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.9rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffccdd); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .logo span { background: linear-gradient(120deg, var(--accent), #ff8a5c); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .nav { display: flex; gap: 2rem; }
    .nav a { color: var(--header-text); text-decoration: none; font-weight: 500; }
    .nav a:hover { color: var(--accent); }
    .header-tools { display: flex; align-items: center; gap: 1.2rem; }
    .icon-btn { background: transparent; border: none; font-size: 1.4rem; color: #fff; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .icon-btn:hover { background: rgba(255,255,255,0.15); color: var(--accent); transform: scale(1.05); }
    .cart-badge { position: absolute; top: -6px; right: -8px; background: var(--accent); font-size: 0.7rem; font-weight: 700; padding: 3px 7px; border-radius: 40px; min-width: 20px; text-align: center; }
    .hamburger { display: none; background: none; border: none; font-size: 1.8rem; color: white; cursor: pointer; }
    .page-hero { padding: 160px 20px 80px; text-align: center; background: linear-gradient(125deg, #0a0f2a, #25204e); color: white; }
    .tabs-nav { display: flex; justify-content: center; gap: 1rem; margin: 2rem 0 2rem; flex-wrap: wrap; }
    .tab-btn { padding: 12px 28px; background: transparent; border: none; font-weight: 600; font-size: 1rem; border-radius: 60px; color: var(--text); cursor: pointer; transition: 0.2s; display: inline-flex; gap: 8px; align-items: center; }
    .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 8px 18px var(--accent-glow); }
    .tab-content { display: none; animation: fade 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 2rem; }
    .card, .video-card { background: var(--card); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); transition: 0.25s; border: 1px solid var(--border-light); }
    .card:hover, .video-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
    .card-img { height: 220px; background: linear-gradient(135deg, #667eea, #b565a7); display: flex; align-items: center; justify-content: center; font-size: 4rem; color: white; }
    .card-info, .video-info { padding: 1.7rem; }
    .badge { display: inline-block; background: var(--accent); padding: 5px 14px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; margin-bottom: 12px; color: white; }
    .btn { padding: 10px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; display: inline-flex; gap: 8px; align-items: center; border: none; transition: 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #e01e55; transform: scale(1.02); }
    .btn-secondary { background: transparent; border: 1.5px solid var(--accent); color: var(--card-text); }
    .btn-secondary:hover { background: var(--accent); color: white; }
    .video-player iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 20px 20px 0 0; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--card); border-radius: 32px; padding: 1.8rem; max-width: 550px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .floating-video-btn { position: fixed; bottom: 30px; right: 30px; background: var(--accent); width: 56px; height: 56px; border-radius: 60px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; cursor: pointer; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s; }
    .floating-video-btn:hover { transform: scale(1.08); }
    .admin-video-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding: 12px 0; }
    input, textarea { background: var(--bg); border: 1px solid var(--border-light); padding: 12px; border-radius: 40px; width: 100%; margin-bottom: 12px; color: var(--text); }
    footer { background: var(--footer-bg); padding: 3rem 1rem; text-align: center; margin-top: 3rem; color: var(--footer-text); }
    @media (max-width: 820px) {
      .nav { position: fixed; top: 0; left: -100%; width: 80%; max-width: 320px; height: 100vh; background: rgba(10,10,20,0.98); backdrop-filter: blur(20px); flex-direction: column; justify-content: center; align-items: center; transition: left 0.4s; z-index: 1050; gap: 2rem; }
      .nav.active { left: 0; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <div class="logo">Devinee<span>Grace</span></div>
    <nav class="nav" id="navMenu">
      <a href="index.html">Home</a>
      <a href="properties.html">Properties</a>
      <a href="contact.html">Contact</a>
      <a href="news.html">News</a>
    </nav>
    <div class="header-tools">
      <button class="icon-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></button>
      <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</header>

<section class="page-hero">
  <h1>Exclusive listings</h1>
  <p>Homes, land, commercial & video tours — you manage the videos</p>
</section>

<div class="container">
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="listings"><i class="fas fa-list"></i> Listings</button>
    <button class="tab-btn" data-tab="videos"><i class="fas fa-video"></i> Video Tours</button>
  </div>
  <div class="tab-content active" id="listings"><div class="grid" id="propertiesGrid"></div></div>
  <div class="tab-content" id="videos">
    <div class="grid" id="videosGrid"></div>
    <div style="text-align:center; margin-top: 2rem;">
      <button id="openVideoManagerBtn" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Add / Manage Videos (self)</button>
    </div>
  </div>
</div>

<!-- Floating video manager button -->
<div class="floating-video-btn" id="floatingVideoBtn"><i class="fas fa-video"></i></div>

<!-- Video Manager Modal -->
<div class="modal-overlay" id="videoManagerModal">
  <div class="modal">
    <h2><i class="fas fa-edit"></i> Manage Video Library</h2>
    <p style="margin-bottom: 16px;">Add new YouTube tours or delete existing ones. Changes save automatically.</p>
    <div id="adminVideoList"></div>
    <div style="margin-top: 20px;">
      <input type="text" id="newVideoTitle" placeholder="Video title (e.g. Oceanfront Mansion Tour)">
      <input type="text" id="newVideoDesc" placeholder="Short description">
      <input type="text" id="newVideoUrl" placeholder="YouTube embed URL (example: https://www.youtube.com/embed/ABC123)">
      <button id="addVideoBtn" class="btn btn-primary" style="width:100%"><i class="fas fa-save"></i> Add Video</button>
    </div>
    <div style="margin-top: 20px;"><button id="closeVideoModal" class="btn btn-secondary">Close</button></div>
  </div>
</div>

<footer>
  <div class="container">
    <p>© 2026 DevineeGrace Properties • <i class="fab fa-whatsapp"></i> <a href="https://wa.me/2349033771605" target="_blank" style="color:var(--accent);">+234 903 377 1605</a></p>
  </div>
</footer>

<script>
  const WHATSAPP = "2349033771605";
  let cart = JSON.parse(localStorage.getItem("devinee_cart") || "[]");
  function updateBadge() { document.getElementById("cartBadge").textContent = cart.length; }
  updateBadge();

  // Property listings
  const properties = [
    { id:1, name:"Amaryllis Villa", location:"Nigeria", features:"6 Beds • 8 Baths • 6,200 sqft • Infinity pool", icon:"fa-home", badge:"Villa" },
    { id:2, name:"Skyline Zenith Penthouse", location:"Abuja, Nigeria", features:"4 Beds • 5 Baths • 4,500 sqft • Panoramic", icon:"fa-city", badge:"Penthouse" },
    { id:3, name:"Crystal Glass Mansion", location:"Lekki, Lagos", features:"7 Beds • 9 Baths • Cinema • Gym", icon:"fa-house-chimney", badge:"Mansion" },
    { id:4, name:"Elysian Fields Estate", location:"Port Harcourt", features:"52 Plots • Gated • Clubhouse", icon:"fa-building", badge:"Estate" },
    { id:5, name:"Mayfair Townhouse", location:"Ikoyi, Lagos", features:"4 beds • Rooftop terrace", icon:"fa-building", badge:"Townhouse" },
    { id:7, name:"Prime Filling Station", location:"Benin City", features:"6 Pumps • 3 Tanks • Mini mart", icon:"fa-gas-pump", badge:"Commercial" },
    { id:8, name:"Golden Acre Land", location:"Lagos, Epe", features:"2000 sqm • C of O • Fenced", icon:"fa-map", badge:"Land" },
    { id:9, name:"Savanna Hills Plots", location:"Abuja, Kuje", features:"1500 sqm • Dry land • Docs ready", icon:"fa-mountain-city", badge:"Land" }
  ];

  // Default videos – user can add/delete
  let videoLibrary = [
    { id:1, title:"Mediterranean Mansion Tour", date:"Apr 2026", description:"Luxury 7‑bed villa with spa and cinema.", embedUrl:"https://www.youtube.com/shorts/0fGgzxc7Qxo" },
    { id:2, title:"Elysian Estate Drone", date:"Mar 2026", description:"Flyover of 52‑plot gated estate.", embedUrl:"https://www.youtube.com/shorts/ZNmYpedNTew" }
    
  ];

  // Load videos from localStorage
  function loadVideos() { const stored = localStorage.getItem("devinee_videos"); if(stored) videoLibrary = JSON.parse(stored); else saveVideos(); }
  function saveVideos() { localStorage.setItem("devinee_videos", JSON.stringify(videoLibrary)); }
  loadVideos();

  function renderProperties() {
    document.getElementById("propertiesGrid").innerHTML = properties.map(p => `
      <div class="card">
        <div class="card-img"><i class="fas ${p.icon} fa-3x"></i></div>
        <div class="card-info">
          <span class="badge">${p.badge}</span>
          <h3>${p.name}</h3>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${p.location}</div>
          <div class="features">${p.features}</div>
          <div class="card-buttons">
            <button class="btn btn-primary add-to-cart" data-id="${p.id}"><i class="fas fa-cart-plus"></i> Shortlist</button>
            <a class="btn btn-secondary" href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(`Hello, I'm interested in ${p.name} (${p.location})`)}" target="_blank"><i class="fab fa-whatsapp"></i> Inquire</a>
          </div>
        </div>
      </div>
    `).join("");
    document.querySelectorAll(".add-to-cart").forEach(btn => {
      btn.addEventListener("click", (e) => { const id = parseInt(btn.dataset.id); addToCart(id); });
    });
  }

  function addToCart(id) {
    const p = properties.find(x => x.id === id);
    if (!cart.find(c => c.id === id)) {
      cart.push({ id: p.id, name: p.name, location: p.location });
      localStorage.setItem("devinee_cart", JSON.stringify(cart));
      updateBadge();
      showToast(`✓ ${p.name} added`);
    } else showToast("Already in shortlist");
  }

  function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    toast.style.cssText = "position:fixed; bottom:90px; right:30px; background:var(--accent); color:white; padding:12px 24px; border-radius:50px; z-index:3000; font-weight:500;";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  function renderVideos() {
    const grid = document.getElementById("videosGrid");
    if (!grid) return;
    grid.innerHTML = videoLibrary.map(v => `
      <div class="video-card">
        <div class="video-player"><iframe src="${v.embedUrl}" allowfullscreen loading="lazy"></iframe></div>
        <div class="video-info">
          <h3>${escapeHtml(v.title)}</h3>
          <div class="video-date"><i class="far fa-calendar"></i> ${v.date}</div>
          <p style="color:var(--muted);">${escapeHtml(v.description)}</p>
        </div>
      </div>
    `).join("");
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Video Manager UI
  function openVideoManager() {
    const modal = document.getElementById("videoManagerModal");
    const listDiv = document.getElementById("adminVideoList");
    listDiv.innerHTML = videoLibrary.map(v => `
      <div class="admin-video-item">
        <div><strong>${escapeHtml(v.title)}</strong><br><small>${v.embedUrl.substring(0,50)}...</small></div>
        <button class="delete-video-btn" data-id="${v.id}" style="background:var(--accent); border:none; color:white; border-radius:40px; padding:4px 12px; cursor:pointer;">Delete</button>
      </div>
    `).join("");
    document.querySelectorAll(".delete-video-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.dataset.id);
        videoLibrary = videoLibrary.filter(v => v.id !== id);
        saveVideos();
        renderVideos();
        openVideoManager(); // refresh modal
      });
    });
    modal.classList.add("active");
  }

  document.getElementById("openVideoManagerBtn")?.addEventListener("click", openVideoManager);
  document.getElementById("floatingVideoBtn")?.addEventListener("click", openVideoManager);
  document.getElementById("closeVideoModal")?.addEventListener("click", () => document.getElementById("videoManagerModal").classList.remove("active"));
  document.getElementById("addVideoBtn")?.addEventListener("click", () => {
    const title = document.getElementById("newVideoTitle").value.trim();
    const desc = document.getElementById("newVideoDesc").value.trim();
    let url = document.getElementById("newVideoUrl").value.trim();
    if (!title || !url) { alert("Please enter a title and a valid YouTube embed URL"); return; }
    const newId = Date.now();
    const today = new Date().toLocaleDateString('en-US', { month:'short', year:'numeric' });
    videoLibrary.push({ id: newId, title, date: today, description: desc || "Property tour", embedUrl: url });
    saveVideos();
    renderVideos();
    openVideoManager(); // refresh manager
    document.getElementById("newVideoTitle").value = "";
    document.getElementById("newVideoDesc").value = "";
    document.getElementById("newVideoUrl").value = "";
  });

  // Tabs
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("listings").classList.toggle("active", btn.dataset.tab === "listings");
      document.getElementById("videos").classList.toggle("active", btn.dataset.tab === "videos");
      if (btn.dataset.tab === "videos") renderVideos();
    });
  });

  // Cart button (quick inquiry)
  document.getElementById("cartBtn").onclick = () => {
    let msg = cart.length ? "My shortlist:\n" + cart.map(c => `- ${c.name} (${c.location})`).join("\n") : "Hello, I'd like property details.";
    window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
  };

  // Theme & mobile menu
  const themeBtn = document.getElementById("themeBtn");
  const savedTheme = localStorage.getItem("devinee_theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  themeBtn.innerHTML = savedTheme === "dark" ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  themeBtn.onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme");
    const nxt = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", nxt);
    localStorage.setItem("devinee_theme", nxt);
    themeBtn.innerHTML = nxt === "dark" ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  };
  document.getElementById("hamburgerBtn").onclick = () => document.getElementById("navMenu").classList.toggle("active");

  renderProperties();
  renderVideos();
</script>
</body>
</html>
